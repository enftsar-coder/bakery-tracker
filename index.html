<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>🍪 Bakery Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Creepster&family=Barlow+Condensed:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0d0a07;--surface:#1a1208;--surface2:#231a0d;
  --amber:#f59e0b;--amber2:#fbbf24;--amberdark:#d97706;
  --red:#ef4444;--green:#22c55e;--cookie:#f97316;
  --text:#fef3c7;--muted:#92765a;--border:#3d2e1a;
}
html,body{background:var(--bg);color:var(--text);font-family:'Barlow Condensed',sans-serif;min-height:100vh;}
.header{text-align:center;padding:2rem 1rem 1.4rem;border-bottom:1px solid var(--border);background:repeating-linear-gradient(45deg,transparent,transparent 20px,rgba(245,158,11,0.03) 20px,rgba(245,158,11,0.03) 40px);}
.hlogo{font-family:'Creepster',cursive;font-size:3rem;color:var(--amber);letter-spacing:4px;text-shadow:0 0 28px rgba(245,158,11,0.35);line-height:1;}
.htag{font-family:'Space Mono',monospace;font-size:0.6rem;color:var(--muted);letter-spacing:4px;text-transform:uppercase;margin-top:6px;}
.rbanner{display:flex;justify-content:center;flex-wrap:wrap;background:var(--surface);border-bottom:1px solid var(--border);}
.rbadge{display:flex;align-items:center;gap:7px;padding:0.6rem 1.3rem;border-right:1px solid var(--border);font-size:0.9rem;}
.rbadge:last-child{border-right:none;}
.rpct{font-family:'Space Mono',monospace;font-weight:700;font-size:1rem;}
.rpct.gold{color:#fbbf24;}.rpct.silver{color:#d1d5db;}.rpct.bronze{color:#f97316;}
.main{max-width:720px;margin:0 auto;padding:1.6rem 1.2rem;}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.sec-title{font-family:'Space Mono',monospace;font-size:0.58rem;color:var(--muted);letter-spacing:3px;text-transform:uppercase;}
.rfbtn{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:5px;padding:4px 12px;font-size:0.72rem;cursor:pointer;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;transition:all .2s;}
.rfbtn:hover{border-color:var(--amber);color:var(--amber);}
.pool-row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:0.8rem 1.1rem;margin-bottom:12px;}
.pi-lbl{font-family:'Space Mono',monospace;font-size:0.58rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:3px;}
.pi-val{font-family:'Space Mono',monospace;font-size:1.05rem;font-weight:700;color:var(--amber);}
.lb-row{display:flex;align-items:center;gap:10px;padding:0.6rem 0.9rem;border-radius:7px;margin-bottom:6px;background:var(--surface);border:1px solid var(--border);cursor:pointer;transition:border-color .15s;}
.lb-row:hover,.lb-row.hl{border-color:var(--amber);}
.lb-row.hl{background:var(--surface2);}
.lb-rank{font-family:'Space Mono',monospace;font-size:0.82rem;font-weight:700;min-width:28px;text-align:center;}
.r1{color:#fbbf24;}.r2{color:#d1d5db;}.r3{color:#f97316;}.rn{color:var(--muted);}
.lb-name{flex:1;font-size:0.95rem;font-weight:600;}
.lb-ck{font-family:'Space Mono',monospace;font-size:0.76rem;color:var(--cookie);}
.lb-pct{font-family:'Space Mono',monospace;font-size:0.7rem;min-width:52px;text-align:right;color:var(--muted);}
.divider{height:1px;background:var(--border);margin:1.4rem 0;}
.slabel{font-family:'Space Mono',monospace;font-size:0.58rem;color:var(--muted);letter-spacing:3px;text-transform:uppercase;display:block;margin-bottom:8px;}
.srow{display:flex;gap:8px;}
.sinput{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:7px;color:var(--text);padding:0.75rem 1rem;font-family:'Space Mono',monospace;font-size:0.73rem;outline:none;transition:border-color .2s;}
.sinput:focus{border-color:var(--amber);}
.sinput::placeholder{color:var(--muted);font-size:0.63rem;}
.dropdown{background:var(--surface);border:1px solid var(--amber);border-radius:7px;margin-top:4px;overflow:hidden;display:none;}
.dropdown.open{display:block;}
.dd-item{display:flex;align-items:center;gap:10px;padding:0.7rem 1rem;cursor:pointer;border-bottom:1px solid var(--border);transition:background .15s;}
.dd-item:last-child{border-bottom:none;}
.dd-item:hover,.dd-item.focused{background:var(--surface2);}
.dd-avatar{width:34px;height:34px;border-radius:50%;background:var(--surface2);border:1px solid var(--amberdark);display:flex;align-items:center;justify-content:center;font-size:0.78rem;color:var(--amber);flex-shrink:0;font-family:'Space Mono',monospace;font-weight:700;}
.dd-info{flex:1;min-width:0;}
.dd-name{font-size:0.92rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dd-addr{font-family:'Space Mono',monospace;font-size:0.6rem;color:var(--muted);}
.dd-badge{font-family:'Space Mono',monospace;font-size:0.6rem;padding:2px 9px;border-radius:4px;border:1px solid var(--border);color:var(--muted);white-space:nowrap;}
.dd-badge.active{border-color:var(--amber);color:var(--amber);}
.sbtn{background:var(--amber);color:#0d0a07;border:none;border-radius:7px;padding:0.75rem 1.4rem;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1.05rem;letter-spacing:1px;cursor:pointer;transition:background .15s,transform .1s;white-space:nowrap;}
.sbtn:hover{background:var(--amber2);}
.sbtn:active{transform:scale(0.97);}
.sbtn:disabled{background:var(--border);color:var(--muted);cursor:not-allowed;}
.stxt{font-family:'Space Mono',monospace;font-size:0.62rem;color:var(--muted);margin-top:6px;min-height:1.2em;padding-left:2px;}
.stxt.err{color:var(--red);}.stxt.ok{color:var(--green);}.stxt.load{color:var(--amber);}
.result-wrap{display:none;margin-top:1.2rem;}
.result-wrap.show{display:block;}
.pcard{display:flex;align-items:center;gap:14px;flex-wrap:wrap;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.2rem 1.3rem;margin-bottom:10px;}
.pava{width:48px;height:48px;border-radius:50%;background:var(--surface2);border:2px solid var(--amber);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;font-family:'Space Mono',monospace;font-weight:700;color:var(--amber);}
.pname{font-family:'Space Mono',monospace;font-size:0.73rem;color:var(--amber);word-break:break-all;}
.pbakery{font-size:0.87rem;color:var(--muted);margin-top:3px;}
.pbname{color:var(--text);font-weight:600;}
.pranktag{font-family:'Space Mono',monospace;font-size:0.7rem;color:var(--amber);border:1px solid var(--amber);border-radius:5px;padding:3px 10px;margin-left:auto;}
.sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:9px;margin-bottom:10px;}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:0.9rem;text-align:center;}
.sl{font-family:'Space Mono',monospace;font-size:0.55rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:5px;}
.sv{font-family:'Space Mono',monospace;font-size:1.15rem;font-weight:700;color:var(--text);}
.sv.g{color:var(--green);}.sv.a{color:var(--amber);}.sv.r{color:var(--red);}.sv.c{color:var(--cookie);}
.ssub{font-size:0.65rem;color:var(--muted);margin-top:2px;}
.rwcard{background:var(--surface2);border:1px solid var(--amberdark);border-radius:10px;padding:1.2rem 1.3rem;margin-bottom:10px;}
.rwtitle{font-family:'Space Mono',monospace;font-size:0.58rem;color:var(--amber);letter-spacing:3px;text-transform:uppercase;margin-bottom:12px;}
.rwrow{display:flex;justify-content:space-between;align-items:center;padding:0.55rem 0;border-bottom:1px solid var(--border);}
.rwrow:last-child{border-bottom:none;}
.rwlbl{font-size:0.84rem;color:var(--muted);}
.rwval{font-family:'Space Mono',monospace;font-size:0.88rem;font-weight:700;}
.errbox{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.3);border-radius:8px;padding:0.9rem;font-size:0.76rem;color:var(--red);font-family:'Space Mono',monospace;margin-bottom:10px;display:none;}
.errbox.show{display:block;}
.dot::after{content:'';animation:dots 1.2s steps(4,end) infinite;}
@keyframes dots{0%,20%{content:'';}40%{content:'.';}60%{content:'..';}80%,100%{content:'...'}}
</style>
</head>
<body>

<div class="header">
  <div class="hlogo">🍪 BAKERY TRACKER</div>
  <div class="htag">RUGPULL BAKERY · ABSTRACT CHAIN · COOK. TRACK. WIN.</div>
</div>

<div class="rbanner">
  <div class="rbadge">🥇 1st Bakery <span class="rpct gold">70%</span></div>
  <div class="rbadge">🥈 2nd Bakery <span class="rpct silver">20%</span></div>
  <div class="rbadge">🥉 3rd Bakery <span class="rpct bronze">10%</span></div>
</div>

<div class="main">
  <div class="sec-hdr">
    <span class="sec-title">LIVE LEADERBOARD</span>
    <button class="rfbtn" onclick="loadLB()">⟳ Yenile</button>
  </div>
  <div class="pool-row">
    <div><div class="pi-lbl">Ödül Havuzu</div><div class="pi-val" id="pv">Yükleniyor<span class="dot"></span></div></div>
    <div><div class="pi-lbl">Aktif Oyuncu</div><div class="pi-val" id="pc">—</div></div>
    <div><div class="pi-lbl">Sezon</div><div class="pi-val" id="sv2">—</div></div>
  </div>
  <div id="lb-err" class="errbox"></div>
  <div id="lb-list"><div style="text-align:center;padding:1.5rem;color:var(--muted);font-family:'Space Mono',monospace;font-size:.72rem">Yükleniyor<span class="dot"></span></div></div>

  <div class="divider"></div>

  <div class="sec-hdr"><span class="sec-title">OYUNCU ARA</span></div>
  <div style="position:relative">
    <span class="slabel">Portal kullanıcı adı veya 0x cüzdan adresi</span>
    <div class="srow">
      <div style="flex:1;position:relative">
        <input class="sinput" id="sinp" type="text" autocomplete="off"
          placeholder="örn: cookiemaster  ·  veya 0xAb12..."
          oninput="onInput()" onkeydown="onKey(event)"/>
        <div class="dropdown" id="ddrop"></div>
      </div>
      <button class="sbtn" id="sbtn" onclick="doLookup()">🔍 ARA</button>
    </div>
    <div class="stxt" id="stxt"></div>
  </div>

  <div class="result-wrap" id="rwrap">
    <div class="pcard" id="pcard"></div>
    <div class="sgrid" id="sgrid"></div>
    <div class="rwcard" id="rcrd"></div>
  </div>
</div>

<script>
// Vercel'de deploy edince /api/proxy otomatik çalışır
const PROXY = "/api/proxy?url=";
const TRPC  = "https://www.rugpullbakery.com/api/trpc";
const PORTAL= "https://backend.portal.abs.xyz/api";
const RPCTS = [0.7, 0.2, 0.1];

let lbData=[], totalPool=0, seasonInfo=null, searchTimer=null;

async function pfetch(targetUrl) {
  const r = await fetch(PROXY + encodeURIComponent(targetUrl));
  if (!r.ok) throw new Error("HTTP " + r.status);
  return r.json();
}

async function trpc(proc, input) {
  const q = input ? "?input=" + encodeURIComponent(JSON.stringify(input)) : "";
  return pfetch(TRPC + "/" + proc + q);
}

function fmt(n) {
  if (!n && n!==0) return "—";
  const x=parseFloat(n); if(isNaN(x)) return "—";
  if(x>=1e9) return (x/1e9).toFixed(2)+"B";
  if(x>=1e6) return (x/1e6).toFixed(2)+"M";
  if(x>=1e3) return (x/1e3).toFixed(2)+"K";
  return x.toFixed(2);
}
function short(a){return a?a.slice(0,6)+"..."+a.slice(-4):"";}
function initials(n){return n?n.replace(/[^a-zA-Z0-9]/g,"").slice(0,2).toUpperCase()||"?":"?";}

async function loadLB() {
  const listEl=document.getElementById("lb-list");
  const errEl=document.getElementById("lb-err");
  errEl.classList.remove("show");
  listEl.innerHTML='<div style="text-align:center;padding:1.5rem;color:var(--muted);font-family:Space Mono,monospace;font-size:.72rem">Yükleniyor<span class="dot"></span></div>';
  try {
    const [season,top]=await Promise.all([
      trpc("leaderboard.getActiveSeason"),
      trpc("leaderboard.getTopBakeries",{limit:10})
    ]);
    seasonInfo=season;
    const baks=top?.result?.data?.bakeries??top?.bakeries??top??[];
    lbData=baks;
    const buyIn=season?.result?.data?.buyIn??season?.buyIn;
    const regs=season?.result?.data?.registrations??season?.registrations??0;
    if(buyIn&&regs){totalPool=(parseFloat(buyIn)/1e18)*regs;document.getElementById("pv").textContent=totalPool.toFixed(5)+" ETH";}
    else document.getElementById("pv").textContent="N/A";
    const sid=season?.result?.data?.id??season?.id;
    document.getElementById("sv2").textContent=sid?"#"+sid:"—";
    document.getElementById("pc").textContent=regs||"—";
    renderLB(baks);
  } catch(e) {
    errEl.textContent="Hata: "+e.message;
    errEl.classList.add("show");
    listEl.innerHTML="";
    document.getElementById("pv").textContent="N/A";
  }
}

function renderLB(baks) {
  const el=document.getElementById("lb-list");
  if(!baks?.length){el.innerHTML='<div style="text-align:center;padding:1rem;color:var(--muted)">Veri yok</div>';return;}
  el.innerHTML=baks.map((b,i)=>{
    const rk=i+1,rc=rk===1?"r1":rk===2?"r2":rk===3?"r3":"rn";
    const re=rk===1?"🥇":rk===2?"🥈":rk===3?"🥉":"#"+rk;
    const ck=fmt(b.totalCookies??b.cookies??b.score??0);
    const nm=b.name??b.clanName??"Bakery #"+(b.id??i+1);
    const pp=RPCTS[i]?(RPCTS[i]*100).toFixed(0)+"% pool":"";
    return `<div class="lb-row" onclick="pickBakery(${i})">
      <span class="lb-rank ${rc}">${re}</span>
      <span class="lb-name">${nm}</span>
      <span class="lb-ck">🍪 ${ck}</span>
      <span class="lb-pct">${pp}</span>
    </div>`;
  }).join("");
}

function pickBakery(i) {
  const b=lbData[i];if(!b)return;
  const rank=i+1,cookies=b.totalCookies??b.cookies??0;
  const est=totalPool>0&&rank<=3?totalPool*RPCTS[rank-1]:null;
  const nm=b.name??b.clanName??"Bakery #"+(b.id??i+1);
  document.getElementById("pcard").innerHTML=`
    <div class="pava">${initials(nm)}</div>
    <div style="flex:1"><div class="pname">Bakery ID: ${b.id??'—'}</div>
    <div class="pbakery">İsim: <span class="pbname">${nm}</span></div></div>
    ${rank<=3?`<div class="pranktag">${rank===1?"🥇 1ST":rank===2?"🥈 2ND":"🥉 3RD"}</div>`:""}`;
  document.getElementById("sgrid").innerHTML=`
    <div class="sc"><div class="sl">COOKIE</div><div class="sv c">🍪 ${fmt(cookies)}</div></div>
    <div class="sc"><div class="sl">SIRALAMA</div><div class="sv ${rank<=3?"a":"r"}">#${rank}</div></div>
    <div class="sc"><div class="sl">ÖDÜL %</div><div class="sv ${rank<=3?"g":"r"}">${rank<=3?(RPCTS[rank-1]*100).toFixed(0)+"%":"0%"}</div></div>
    <div class="sc"><div class="sl">TAHMİNİ</div><div class="sv ${est?"a":"r"}">${est?est.toFixed(5)+" ETH":"—"}</div></div>`;
  renderReward(rank,null,est,null);
  document.getElementById("rwrap").classList.add("show");
}

async function onInput() {
  const v=document.getElementById("sinp").value.trim();
  clearTimeout(searchTimer);
  if(v.length<2){closeDrop();return;}
  if(v.startsWith("0x")&&v.length>=10){closeDrop();return;}
  searchTimer=setTimeout(()=>searchUsers(v),350);
}

function onKey(e) {
  const dd=document.getElementById("ddrop");
  const items=[...dd.querySelectorAll(".dd-item")];
  let cur=items.findIndex(x=>x.classList.contains("focused"));
  if(e.key==="ArrowDown"){e.preventDefault();if(cur<items.length-1){if(cur>=0)items[cur].classList.remove("focused");items[cur+1].classList.add("focused");}}
  else if(e.key==="ArrowUp"){e.preventDefault();if(cur>0){items[cur].classList.remove("focused");items[cur-1].classList.add("focused");}}
  else if(e.key==="Enter"){const f=dd.querySelector(".dd-item.focused");if(f)f.click();else doLookup();}
  else if(e.key==="Escape")closeDrop();
}

async function searchUsers(q) {
  try {
    const d=await pfetch(`${PORTAL}/search/users?q=${encodeURIComponent(q)}&limit=6`);
    const users=d.users??d.results??d??[];
    showDrop(Array.isArray(users)?users:[]);
  } catch {
    try {
      const d2=await pfetch(`${PORTAL}/user/address/${encodeURIComponent(q)}`);
      if(d2?.address)showDrop([d2]);else closeDrop();
    } catch{closeDrop();}
  }
}

function showDrop(users) {
  const dd=document.getElementById("ddrop");
  if(!users?.length){closeDrop();return;}
  dd.innerHTML=users.slice(0,6).map(u=>{
    const nm=u.username??u.name??u.handle??short(u.address??"");
    const addr=u.address??u.wallet??"";
    const active=u.isActive??u.registered??false;
    return `<div class="dd-item" onclick="selectUser('${addr}','${nm}')">
      <div class="dd-avatar">${initials(nm)}</div>
      <div class="dd-info"><div class="dd-name">${nm}</div><div class="dd-addr">${short(addr)}</div></div>
      <span class="dd-badge ${active?"active":""}">${active?"🍪 ACTIVE":"—"}</span>
    </div>`;
  }).join("");
  dd.classList.add("open");
}

function closeDrop(){const dd=document.getElementById("ddrop");dd.classList.remove("open");dd.innerHTML="";}
function selectUser(addr,name){document.getElementById("sinp").value=name||addr;closeDrop();doLookup(addr,name);}

async function doLookup(forcedAddr,forcedName) {
  const raw=forcedAddr??document.getElementById("sinp").value.trim();
  if(!raw)return;
  const btn=document.getElementById("sbtn"),stxt=document.getElementById("stxt");
  btn.disabled=true;stxt.className="stxt load";stxt.textContent="Aranıyor...";
  document.getElementById("rwrap").classList.remove("show");
  try {
    let address=raw,displayName=forcedName??null;
    if(!raw.startsWith("0x")){
      stxt.textContent="Portal kullanıcısı çözümleniyor...";
      try{const d=await pfetch(`${PORTAL}/user/address/${encodeURIComponent(raw)}`);
        address=d.address??d.wallet??raw;displayName=displayName??d.username??d.name??raw;}catch{}
    }
    stxt.textContent="Bakery verisi alınıyor...";
    const [bakRes,portRes]=await Promise.allSettled([
      trpc("leaderboard.getPlayerBakery",{address}),
      pfetch(`${PORTAL}/user/${address}/portfolio/value/total`)
    ]);
    const bak=bakRes.status==="fulfilled"?bakRes.value:null;
    const port=portRes.status==="fulfilled"?portRes.value:null;
    if(!bak&&!port)throw new Error("Bu adrese ait oyuncu verisi bulunamadı.");
    renderPlayer(address,displayName,bak,port);
    stxt.className="stxt ok";stxt.textContent="✓ Veri yüklendi.";
  } catch(e){stxt.className="stxt err";stxt.textContent="✗ "+e.message;}
  finally{btn.disabled=false;}
}

function renderPlayer(addr,name,bak,port){
  const dn=name??short(addr);
  const bakName=bak?.result?.data?.clan?.name??bak?.clan?.name??bak?.clanName??bak?.name??"—";
  const bakId=bak?.result?.data?.clan?.id??bak?.clan?.id??bak?.clanId??null;
  const cookies=bak?.result?.data?.player?.cookies??bak?.player?.cookies??bak?.cookies??0;
  const rank=bakId?(lbData.findIndex(b=>String(b.id)===String(bakId))+1||null):null;
  const est=rank&&rank<=3&&totalPool>0?totalPool*RPCTS[rank-1]:null;
  const buyIn=seasonInfo?.result?.data?.buyIn??seasonInfo?.buyIn?parseFloat(seasonInfo?.result?.data?.buyIn??seasonInfo?.buyIn)/1e18:0.002;
  const ethBal=port?.eth??null;
  const portVal=port?.totalUsd??port?.total??null;
  document.getElementById("pcard").innerHTML=`
    <div class="pava">${initials(dn)}</div>
    <div style="flex:1"><div class="pname">${addr}</div>
    <div class="pbakery">Kullanıcı: <span class="pbname">${dn}</span> · Bakery: <span class="pbname">${bakName}</span></div></div>
    ${rank&&rank<=3?`<div class="pranktag">${rank===1?"🥇 1ST":rank===2?"🥈 2ND":"🥉 3RD"}</div>`:rank?`<div style="font-family:'Space Mono',monospace;font-size:.7rem;color:var(--muted);border:1px solid var(--border);border-radius:5px;padding:3px 9px;margin-left:auto">#${rank}</div>`:""}`;
  let stats=`
    <div class="sc"><div class="sl">COOKIE</div><div class="sv c">🍪 ${fmt(cookies)}</div></div>
    <div class="sc"><div class="sl">BAKERY SIRASI</div><div class="sv ${rank&&rank<=3?"a":rank?"":"r"}">${rank?"#"+rank:"—"}</div></div>
    <div class="sc"><div class="sl">GİRİŞ MALİYETİ</div><div class="sv r">${buyIn.toFixed(4)} ETH</div><div class="ssub">buy-in</div></div>
    <div class="sc"><div class="sl">TAHMİNİ ÖDÜL</div><div class="sv ${est?"a":"r"}">${est?est.toFixed(5)+" ETH":rank?"0 ETH":"—"}</div></div>`;
  if(ethBal!==null)stats+=`<div class="sc"><div class="sl">CÜZDAN</div><div class="sv g">${parseFloat(ethBal).toFixed(5)} ETH</div></div>`;
  if(portVal!==null)stats+=`<div class="sc"><div class="sl">PORTFÖY</div><div class="sv g">$${parseFloat(portVal).toFixed(2)}</div></div>`;
  document.getElementById("sgrid").innerHTML=stats;
  renderReward(rank,buyIn,est,est!==null?est-buyIn:null);
  document.getElementById("rwrap").classList.add("show");
}

function renderReward(rank,buyIn,est,net){
  let rows="";
  if(rank)rows+=`<div class="rwrow"><span class="rwlbl">Bakery Sırası</span><span class="rwval" style="color:${rank<=3?"var(--amber)":"var(--muted)"}">#${rank}</span></div>`;
  if(rank&&rank<=3)rows+=`<div class="rwrow"><span class="rwlbl">Ödül Yüzdesi</span><span class="rwval" style="color:var(--green)">${(RPCTS[rank-1]*100).toFixed(0)}% havuz</span></div>`;
  if(totalPool>0)rows+=`<div class="rwrow"><span class="rwlbl">Toplam Havuz</span><span class="rwval" style="color:var(--amber)">${totalPool.toFixed(5)} ETH</span></div>`;
  if(est!==null)rows+=`<div class="rwrow"><span class="rwlbl">Tahmini Ödül</span><span class="rwval" style="color:${est>0?"#fbbf24":"var(--muted)"}">${est.toFixed(6)} ETH</span></div>`;
  if(buyIn!==null)rows+=`<div class="rwrow"><span class="rwlbl">Giriş Maliyeti</span><span class="rwval" style="color:var(--red)">-${buyIn.toFixed(5)} ETH</span></div>`;
  if(net!==null)rows+=`<div class="rwrow" style="border-top:1px solid var(--border);margin-top:4px;padding-top:10px"><span class="rwlbl" style="font-weight:700;color:var(--text)">NET KAR / ZARAR</span><span class="rwval" style="color:${net>0?"var(--green)":"var(--red)"};font-size:1.05rem">${net>0?"+":""}${net.toFixed(6)} ETH</span></div>`;
  if(!rows)rows=`<div class="rwrow"><span class="rwlbl" style="color:var(--muted)">Aktif sezonda kayıt bulunamadı.</span></div>`;
  document.getElementById("rcrd").innerHTML=`<div class="rwtitle">📊 KAR / ZARAR ANALİZİ</div>${rows}`;
}

document.addEventListener("click",e=>{
  if(!document.getElementById("sinp").contains(e.target)&&!document.getElementById("ddrop").contains(e.target))closeDrop();
});

loadLB();
setInterval(loadLB,30000);
</script>
</body>
</html>
